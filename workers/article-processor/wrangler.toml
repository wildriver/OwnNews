name = "ownnews-processor"
main = "src/index.ts"
compatibility_date = "2024-04-01"
# 本番アカウント（Yutaka.arakawa@gmail.com）。別アカウントへの誤デプロイ防止のため明記
account_id = "ee5da4b123e80074bde2fc70319e1780"

[ai]
binding = "AI"

# 記事パック配信用R2バケット
# 事前に Cloudflare Dashboard > R2 で "ownnews-pack" バケットを作成すること
[[r2_buckets]]
binding = "PACK_BUCKET"
bucket_name = "ownnews-pack"

[triggers]
# 30分おきに終日実行（:00 と :30）。以前は5つの2時間ウィンドウに固めていたが、
# 収集（GitHub）が遅延・スキップされると新着が数時間フィードに出ない問題があった。
# 終日回すことで収集後おおむね30分以内にパックが最新化される。
# LLM（さくら）の消費は「実行回数」ではなく「新規記事数」に比例する（新着ゼロの回は
# DB確認だけの空振りでAI呼び出しなし）ため、頻度を上げても月間コストは増えない。
#
# 注意: 時(hour)フィールドをベタ "*" にした "*/30 * * * *" はCloudflareで発火しなかった。
# 実績のあるカンマ列hour形式（旧構成 "*/10 21,22 * * *" は動作）で全24時間を列挙する。
crons = [
    "*/30 0,1,2,3,4 * * *",
    "*/30 5,6,7,8,9 * * *",
    "*/30 10,11,12,13,14 * * *",
    "*/30 15,16,17,18,19 * * *",
    "*/30 20,21,22,23 * * *"
]

[vars]
SAKURA_MODEL = "gpt-oss-120b"
