name = "ownnews-web"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# 記事パック配信用R2バケット（article-processor Workerが生成、/api/pack が配信）
[[r2_buckets]]
binding = "PACK_BUCKET"
bucket_name = "ownnews-pack"

[vars]
# Placeholder for secrets. Use Cloudflare Dashboard to set these.
# NEXT_PUBLIC_SUPABASE_URL = "..."
# NEXT_PUBLIC_SUPABASE_ANON_KEY = "..."
# GROQ_API_KEY = "..."
