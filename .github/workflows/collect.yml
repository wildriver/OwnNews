name: Collect News

on:
  schedule:
    # 毎時。GitHubのスケジュールは数時間遅延・スキップされるため、起動回数を
    # 増やして「何時間も更新されない」穴を防ぐ。ニュースサイトとして許容できる
    # 遅延にするには収集間隔がそのまま下限になるため、1時間まで詰める。
    # 収集は差分（新規リンクのみ保存）。CEEKへはホスト別間隔(10秒)＋素性明示UAで
    # 配慮しており、13リクエスト/時と控えめ。
    - cron: '0 * * * *'
  workflow_dispatch:       # 手動実行も可能

permissions:
  actions: write   # keepalive（60日無活動による自動無効化の防止）に必要

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      # GitHubはリポジトリに60日間活動がないとscheduleを自動無効化する。
      # 実行のたびにenable APIを叩いてタイマーをリセットする。
      - name: Keepalive (prevent scheduled workflow auto-disable)
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/collect.yml/enable"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests supabase

      - name: Run collector
        run: python collector.py
