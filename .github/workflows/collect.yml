name: Collect News

on:
  schedule:
    # 2時間おき。GitHubのスケジュールは数時間遅延・スキップされるため、
    # 起動回数を増やして「朝から更新されない」ような長い穴を防ぐ。
    # 収集は差分（新規リンクのみ保存）なのでDB・CEEK負荷はほぼ増えない
    # （CEEKへはホスト別間隔で配慮）。
    - cron: '0 */2 * * *'
  workflow_dispatch:       # 手動実行も可能

permissions:
  actions: write   # keepalive（60日無活動による自動無効化の防止）に必要

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      # GitHubはリポジトリに60日間活動がないとscheduleを自動無効化する。
      # 実行のたびにenable APIを叩いてタイマーをリセットする。
      - name: Keepalive (prevent scheduled workflow auto-disable)
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/collect.yml/enable"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests supabase

      - name: Run collector
        run: python collector.py
